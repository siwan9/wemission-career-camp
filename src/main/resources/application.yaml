spring:
  application:
    name: career-camp
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
      jakarta:
        persistence:
          lock:
            timeout: 5000
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    locations: classpath:db/migration
  web:
    resources:
      cache:
        cachecontrol:
          cache-public: true
          max-age: 365d
      chain:
        cache: true
        strategy:
          content:
            enabled: true
            paths:
              - /css/**
              - /js/**
              - /images/**
              - /vendor/**
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: career-camp-scheduler-
server:
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  tomcat:
    threads:
      max: ${SERVER_MAX_THREADS:250}
      min-spare: ${SERVER_MIN_SPARE_THREADS:20}
    accept-count: ${SERVER_ACCEPT_COUNT:1000}
    max-connections: ${SERVER_MAX_CONNECTIONS:4096}
  servlet:
    session:
      timeout: 30m
      tracking-modes: cookie
      cookie:
        http-only: true
        same-site: lax

career-camp:
  admin:
    session-timeout-seconds: ${ADMIN_SESSION_TIMEOUT_SECONDS:-1}
  recruitment:
    status-sync-interval-ms: ${RECRUITMENT_STATUS_SYNC_INTERVAL_MS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,registrationConsistency

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:24}
      minimum-idle: ${DB_POOL_MIN_IDLE:8}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: 3000
      max-lifetime: 1800000
      transaction-isolation: TRANSACTION_READ_COMMITTED
      connection-init-sql: "SET SESSION time_zone = '+09:00', innodb_lock_wait_timeout = ${DB_LOCK_WAIT_TIMEOUT_SECONDS:5}"
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:24}
      minimum-idle: ${DB_POOL_MIN_IDLE:8}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: 3000
      max-lifetime: 1800000
      transaction-isolation: TRANSACTION_READ_COMMITTED
      connection-init-sql: "SET SESSION time_zone = '+09:00', innodb_lock_wait_timeout = ${DB_LOCK_WAIT_TIMEOUT_SECONDS:5}"
server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:true}
