<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1">

    <title>진로특강 관리자</title>

    <link
            rel="stylesheet"
            th:href="@{/css/admin/home.css}">
    <link
            rel="stylesheet"
            th:href="@{/css/footer.css}">
</head>

<body>

<div class="page-container">
    <header class="page-header">
        <div>
            <p class="page-eyebrow">
                관리자 대시보드
            </p>
            <h1 class="page-title">
                진로특강 관리
            </h1>
            <p
                    class="page-subtitle"
                    th:text="${adminName + '님, 모집 현황을 확인하세요.'}">
                관리자님, 모집 현황을 확인하세요.
            </p>
        </div>

        <form
                method="post"
                action="/admin/logout">
            <button
                    type="submit"
                    class="logout-btn">
                로그아웃
            </button>
        </form>
    </header>

    <section class="summary-grid">
        <div class="summary-card">
            <div class="summary-label">
                전체 모집
            </div>
            <div
                    class="summary-value"
                    th:text="${totalRecruitmentCount}">
                0
            </div>
        </div>

        <div class="summary-card">
            <div class="summary-label">
                현재 상태
            </div>
            <div
                    class="summary-value summary-status"
                    th:text="${currentStatusDescription}">
                모집시작
            </div>
        </div>
    </section>

    <div
            th:if="${successMessage != null}"
            class="admin-home-alert success"
            th:text="${successMessage}">
        처리되었습니다.
    </div>
    <div
            th:if="${errorMessage != null}"
            class="admin-home-alert error"
            th:text="${errorMessage}">
        오류가 발생했습니다.
    </div>
    <div
            th:if="${operationErrorMessage != null}"
            class="admin-home-alert error"
            th:text="${operationErrorMessage}">
        요청을 처리할 수 없습니다.
    </div>

    <section
            class="section recruitment-create-section"
            data-recruitment-create
            th:classappend="${errorMessage != null ? ' is-open' : ''}">
        <button
                type="button"
                class="section-heading recruitment-create-header"
                data-recruitment-create-toggle
                aria-expanded="false"
                aria-label="모집 추가 폼 열기">
            <span>
                <h2 class="section-title">
                    모집 추가
                </h2>
                <p class="section-description">
                    모집 기간과 안내 문구를 입력하면 신청 화면에 바로 반영됩니다.
                </p>
            </span>
            <span class="recruitment-create-toggle" aria-hidden="true">
                <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round">
                    <path d="m6 9 6 6 6-6"/>
                </svg>
            </span>
        </button>
        <div class="recruitment-create-panel">
            <form
                    class="recruitment-create-form"
                    method="post"
                    action="/admin/recruitments">
                <div class="form-field form-field-wide">
                    <label for="recruitmentName">
                        모집명
                    </label>
                    <input
                            id="recruitmentName"
                            type="text"
                            name="name"
                            placeholder="예: 2026 위미션 진로특강"
                            required>
                </div>

                <div class="form-field">
                    <label for="recruitmentStartAt">
                        시작일시
                    </label>
                    <input
                            id="recruitmentStartAt"
                            type="datetime-local"
                            name="startAt"
                            required>
                </div>

                <div class="form-field">
                    <label for="recruitmentEndAt">
                        종료일시
                    </label>
                    <input
                            id="recruitmentEndAt"
                            type="datetime-local"
                            name="endAt"
                            required>
                </div>

                <div class="form-field form-field-full">
                    <label for="recruitmentDescription">
                        모집 설명
                    </label>
                    <textarea
                            id="recruitmentDescription"
                            name="description"
                            rows="2"
                            placeholder="홈 화면에 표시할 모집 설명"
                            required></textarea>
                </div>

                <div class="form-field form-field-full">
                    <label for="recruitmentNotice">
                        신청 안내 문구
                    </label>
                    <textarea
                            id="recruitmentNotice"
                            name="notice"
                            rows="3"
                            placeholder="신청자가 기본정보 입력 및 특강 선택 전에 확인할 안내 문구"
                            required></textarea>
                </div>

                <div class="recruitment-create-actions">
                    <button type="submit">
                        모집 추가
                    </button>
                </div>
            </form>
        </div>
    </section>

    <section class="section">
        <div class="section-heading">
            <div>
                <h2 class="section-title">
                    모집 운영 현황
                </h2>
                <p class="section-description">
                    모집중, 대기중, 지난 모집을 나눠 관리합니다. 진행성 모집이 없으면 가장 최근 지난 모집이 결과 확인용으로 공개됩니다.
                </p>
            </div>
        </div>

        <div
                class="recruitment-status-groups">
            <section
                    class="recruitment-status-group"
                    th:each="group : ${recruitmentGroups}"
                    th:attr="data-recruitment-status=${group.status.name()},data-recruitment-status-label=${group.status.description}">
                <div class="recruitment-status-heading">
                    <div>
                        <h3
                                class="recruitment-status-title"
                                th:text="${group.title}">
                            모집중
                        </h3>
                        <p
                                class="recruitment-status-description"
                                th:text="${group.description}">
                            상태 설명
                        </p>
                    </div>
                    <span
                            class="recruitment-status-count"
                            th:text="${#lists.size(group.recruitments)}">
                        0
                    </span>
                </div>

                <div
                        class="recruitment-dropzone"
                        data-recruitment-dropzone>
                    <div
                            th:if="${#lists.isEmpty(group.recruitments)}"
                            class="empty-state empty-state-compact">
                        해당 상태의 모집이 없습니다.
                    </div>

                    <div
                            th:unless="${#lists.isEmpty(group.recruitments)}"
                            class="recruitment-list">
                        <div
                                class="recruitment-manage-row"
                                draggable="true"
                                th:each="recruitment : ${group.recruitments}"
                                th:attr="data-recruitment-id=${recruitment.id},data-recruitment-name=${recruitment.name},data-recruitment-current-status=${recruitment.status.name()}">
                            <a
                                    class="recruitment-card"
                                    th:classappend="${group.active ? ' active' : ''}"
                                    th:href="@{/admin/recruitment-dashboard/{recruitmentId}(recruitmentId=${recruitment.id})}">
                                <div class="recruitment-main">
                                    <div class="recruitment-title-row">
                                        <h3
                                                class="recruitment-title"
                                                th:text="${recruitment.name}">
                                            모집명
                                        </h3>
                                        <span
                                                class="status-badge"
                                                th:classappend="${group.active ? '' : ' status-badge-muted'}"
                                                th:text="${recruitment.statusDescription}">
                                            상태
                                        </span>
                                    </div>

                                    <p
                                            class="recruitment-desc"
                                            th:text="${recruitment.description}">
                                        모집 설명
                                    </p>

                                    <div class="recruitment-meta">
                                        <span>
                                            신청자
                                            <strong th:text="${participantCounts[recruitment.id] ?: 0}">0</strong>명
                                        </span>
                                        <span>
                                            기간 :
                                            <strong th:text="${#temporals.format(recruitment.startAt, 'yyyy.MM.dd HH:mm')}">2026.07.01 09:00</strong>
                                            -
                                            <strong th:text="${#temporals.format(recruitment.endAt, 'yyyy.MM.dd HH:mm')}">2026.07.10 18:00</strong>
                                        </span>
                                    </div>
                                </div>
                            </a>
                            <form
                                    class="recruitment-delete-form"
                                    method="post"
                                    th:action="@{/admin/recruitments/{recruitmentId}/delete(recruitmentId=${recruitment.id})}">
                                <button
                                        type="submit"
                                        class="recruitment-delete-btn"
                                        th:disabled="${recruitment.status.name() != 'CLOSED'}"
                                        th:attr="aria-label=${recruitment.status.name() == 'CLOSED' ? '모집 삭제' : '종료 후 삭제할 수 있습니다.'},title=${recruitment.status.name() == 'CLOSED' ? '모집 삭제' : '모집중 또는 대기중인 모집은 종료 후 삭제할 수 있습니다.'}"
                                        onclick="return confirm('해당 모집과 참가자, 신청 내역이 모두 삭제됩니다. 계속할까요?')">
                                    <svg
                                            aria-hidden="true"
                                            viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            stroke-linecap="round"
                                            stroke-linejoin="round">
                                        <path d="M3 6h18"/>
                                        <path d="M8 6V4h8v2"/>
                                        <path d="M19 6l-1 14H6L5 6"/>
                                        <path d="M10 11v5"/>
                                        <path d="M14 11v5"/>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </section>
</div>

<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>
<script th:src="@{/js/admin/home.js}"></script>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>

</body>
</html>
