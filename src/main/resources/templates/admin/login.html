<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>관리자 로그인</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/footer.css}">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 24px;
        }

        .login-card {
            margin-top: 80px;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .login-title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 28px;
        }

        .btn-login {
            height: 50px;
            font-size: 1rem;
            font-weight: 600;
        }

        .form-control{
            height: 56px;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-control::placeholder {
            color: #adb5bd;
            opacity: 1;
        }

        @media (max-width: 576px) {

            .login-container {
                padding: 16px;
            }

            .login-card {
                margin-top: 40px;
                padding: 24px;
            }

            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>

</head>
<body>

<div class="login-container">

    <div class="login-card">

        <h2 class="login-title">
            관리자 로그인
        </h2>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    아이디
                </label>

                <input
                        type="text"
                        class="form-control form-control-lg"
                        placeholder="아이디를 입력하세요">
            </div>

            <div class="mb-4">
                <label class="form-label">
                    비밀번호
                </label>

                <input
                        type="password"
                        class="form-control form-control-lg"
                        placeholder="비밀번호를 입력하세요">
            </div>

            <button
                    type="submit"
                    class="btn btn-dark w-100 btn-login">
                로그인
            </button>

        </form>

    </div>

</div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>

</body>
</html>
