<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>모집 관리</title>

    <link rel="stylesheet"
          th:href="@{/css/admin/recruitment-dashboard.css}">
    <link rel="stylesheet"
          th:href="@{/css/footer.css}">

</head>

<body>

<div class="page-container">

    <header class="page-header">

        <div>

            <a href="/admin/home"
               class="back-link">

                ← 모집 목록

            </a>

            <h1
                    class="page-title"
                    th:text="${recruitment.name}">
                2026 여름 진로캠프
            </h1>

            <p
                    class="page-subtitle"
                    th:text="${recruitment.open ? '모집중' : '종료'}">
                모집중
            </p>

        </div>

    </header>

    <!-- 통계 -->

    <section class="stats-grid">

        <div class="stat-card">
            <div
                    class="stat-value"
                    th:text="${participantCount}">327</div>
            <div class="stat-label">신청자</div>
        </div>

        <div class="stat-card">
            <div
                    class="stat-value"
                    th:text="${morningApplicationCount}">0</div>
            <div class="stat-label">오전 신청</div>
        </div>

        <div class="stat-card">
            <div
                    class="stat-value"
                    th:text="${afternoonApplicationCount}">0</div>
            <div class="stat-label">오후 신청</div>
        </div>

        <div class="stat-card">
            <div
                    class="stat-value"
                    th:text="${lectureCount}">0</div>
            <div class="stat-label">강의 수</div>
        </div>

    </section>

    <section class="lecture-overview">
        <div class="lecture-column">
            <h2>
                오전 특강
            </h2>
            <div
                    th:if="${#lists.isEmpty(morningLectures)}"
                    class="empty-list">
                등록된 오전 특강이 없습니다.
            </div>
            <div
                    class="lecture-list"
                    th:unless="${#lists.isEmpty(morningLectures)}">
                <div
                        class="lecture-row"
                        th:each="lecture : ${morningLectures}">
                    <span th:text="${lecture.name}">강의명</span>
                    <strong th:text="${lecture.participantCount + ' / ' + lecture.maxCapacity}">0 / 0</strong>
                </div>
            </div>
        </div>

        <div class="lecture-column">
            <h2>
                오후 특강
            </h2>
            <div
                    th:if="${#lists.isEmpty(afternoonLectures)}"
                    class="empty-list">
                등록된 오후 특강이 없습니다.
            </div>
            <div
                    class="lecture-list"
                    th:unless="${#lists.isEmpty(afternoonLectures)}">
                <div
                        class="lecture-row"
                        th:each="lecture : ${afternoonLectures}">
                    <span th:text="${lecture.name}">강의명</span>
                    <strong th:text="${lecture.participantCount + ' / ' + lecture.maxCapacity}">0 / 0</strong>
                </div>
            </div>
        </div>
    </section>

    <!-- 참가자 검색 -->

    <section class="search-card">

        <h2>
            참가자 빠른 조회
        </h2>

        <form>

            <div class="search-wrapper">

                <input
                        type="text"
                        placeholder="휴대전화 번호 입력">

                <button type="submit">
                    검색
                </button>

            </div>

        </form>

    </section>

    <!-- 관리 메뉴 -->

    <section class="menu-grid">

        <a th:href="@{/admin/recruitments/{recruitmentId}/participants(recruitmentId=${recruitment.id})}"
           class="menu-card">

            <div class="menu-title">
                참가자 관리
            </div>

            <div class="menu-desc">
                신청 내역 조회 및 수정
            </div>

        </a>

        <a th:href="@{/admin/recruitments/{recruitmentId}/lectures(recruitmentId=${recruitment.id})}"
           class="menu-card">

            <div class="menu-title">
                강의 관리
            </div>

            <div class="menu-desc">
                강의 등록 및 수정
            </div>

        </a>

        <a th:href="@{/admin/recruitments/{recruitmentId}/assignment(recruitmentId=${recruitment.id})}"
           class="menu-card">

            <div class="menu-title">
                배정 관리
            </div>

            <div class="menu-desc">
                자동 배정 및 결과 확인
            </div>

        </a>

        <a th:href="@{/admin/recruitments/{recruitmentId}/settings(recruitmentId=${recruitment.id})}"
           class="menu-card">

            <div class="menu-title">
                모집 설정
            </div>

            <div class="menu-desc">
                모집 수정 및 마감
            </div>

        </a>

    </section>

    <!-- 다운로드 -->

    <section class="download-card">

        <div>

            <div class="download-title">
                배정 결과 다운로드
            </div>

            <div class="download-desc">
                참가자 및 배정 결과 엑셀 파일 생성
            </div>

        </div>

        <a th:href="@{/admin/recruitments/{recruitmentId}/excel(recruitmentId=${recruitment.id})}"
           class="download-btn">

            엑셀 다운로드

        </a>

    </section>

</div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>

</body>
</html>
