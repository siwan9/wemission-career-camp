<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>진로특강 신청</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/home.css}">
    <link rel="stylesheet"
          th:href="@{/css/footer.css}">
</head>
<body>
<div th:if="${success}"
     class="alert alert-success alert-dismissible fade show success-alert">

    신청이 완료되었습니다 🎉

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>
</div>

<div class="main-container">

    <div class="notice-card text-center">

        <div class="emoji">
            🎓
        </div>

        <h1 class="title"
            th:text="${recruitmentEntity != null ? recruitmentEntity.name : '현재 신청 가능한 모집이 없습니다'}">
            현재 신청 가능한 모집이 없습니다
        </h1>

        <p class="subtitle home-description"
           th:if="${recruitmentEntity != null}"
           th:text="${recruitmentEntity.description}">
            원하는 진로특강을 선택하고 신청할 수 있습니다.<br>
            신청 내역 조회도 가능합니다.
        </p>

        <p class="subtitle"
           th:unless="${recruitmentEntity != null}">
            모집이 시작되면 이 화면에서 신청할 수 있습니다.
        </p>

        <div class="text-muted"
             th:if="${recruitmentEntity != null}">
            신청기간<br>
            <span th:text="${#temporals.format(recruitmentEntity.startAt, 'yyyy.MM.dd')}">
                2026.07.01
            </span>
            ~
            <span th:text="${#temporals.format(recruitmentEntity.endAt, 'yyyy.MM.dd')}">
                2026.07.10
            </span>
        </div>

    </div>

    <div class="menu-wrapper">

        <a th:if="${recruitmentEntity != null}"
           href="/register"
           class="btn btn-primary menu-btn">
            특강 신청하기
        </a>

        <a th:if="${recruitmentEntity != null}"
           href="/lectures"
           class="btn btn-outline-primary menu-btn">
            전체 강좌 보기
        </a>

        <a href="/lookup"
           class="btn btn-outline-primary menu-btn">
            신청 내역 조회
        </a>

    </div>

</div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home.js}"></script>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>
</body>
</html>
