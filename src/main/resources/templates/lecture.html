<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1">

    <title>2026 위미션 진로캠프 - 특강 선택</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        th:href="@{/css/register.css}">
    <link
        rel="stylesheet"
        th:href="@{/css/footer.css}">
</head>

<body>

<div class="registration-container">
    <div class="registration-card">
        <div class="text-center mb-4">
            <img
                src="/images/wemission.png"
                class="logo img-fluid mb-3">

            <div class="badge bg-primary fs-6 mb-3">
                2026 WEMISSION CAREER CAMP
            </div>

            <h2 class="camp-title">
                2026 위미션 진로캠프
            </h2>

            <h4 class="page-title">
                특강 선택
            </h4>

        </div>

        <div class="alert alert-info">
            <strong>신청 안내</strong><br>
            <div
                class="notice-content"
                th:text="${recruitment != null ? recruitment.notice : '현재 신청 가능한 모집이 없습니다.'}">
                신청 안내가 표시됩니다.
            </div>
        </div>

        <div
            th:if="${successMessage}"
            class="flash-toast flash-toast-success"
            th:text="${successMessage}">
        </div>

        <div
            th:if="${errorMessage}"
            class="flash-toast flash-toast-error"
            th:text="${errorMessage}">
        </div>

        <div
            th:if="${canSelectMorningLecture == true}">

            <div class="section-header">
                <div class="section-icon">
                    🌞
                </div>

                <div>
                    <div class="section-title">
                        오전 특강
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-5">
                <div
                    class="col-12"
                    th:each="lectureEntity : ${morningLectures}">

                    <div
                        class="card lectureEntity-card h-100"
                        th:classappend="${(selectedMorningLectureId != null and selectedMorningLectureId == lectureEntity.id ? ' lectureEntity-card-selected' : '') + (!lectureEntity.open ? ' lectureEntity-card-pending' : '')}"
                        th:attr="data-lecture-id=${lectureEntity.id},data-lecture-type='AM',data-remaining-capacity=${lectureEntity.remainingCapacity},data-full=${lectureEntity.full},data-open=${lectureEntity.open}">
                        <div class="card-body">
                            <div
                                class="selected-lectureEntity-badge mb-3"
                                th:classappend="${selectedMorningLectureId != null and selectedMorningLectureId == lectureEntity.id ? '' : ' d-none'}">
                                선택한 특강
                            </div>
                            <div
                                class="pending-lectureEntity-badge mb-3"
                                th:classappend="${lectureEntity.open ? ' d-none' : ''}">
                                준비중
                            </div>

                            <div class="lecture-speaker-line">
                                <h5
                                    class="card-title"
                                    th:text="${lectureEntity.speakerName + ' 강사'}">
                                </h5>
                                <span
                                    class="lecture-job-badge"
                                    th:text="${lectureEntity.speakerJob}">
                                    직업
                                </span>
                            </div>
                            <p
                                class="card-text"

                                th:text="${lectureEntity.description}">
                            </p>
                            <span
                                class="badge bg-secondary"

                                th:text="${'남은 자리 ' + (lectureEntity.open ? lectureEntity.remainingCapacity : 0) + '명'}">
                            </span>

                            <div
                                class="mt-4 lectureEntity-action-area"
                                th:if="${selectedMorningLectureId != null and selectedMorningLectureId == lectureEntity.id}">
                                <form
                                    th:action="@{/lectures/cancel}"
                                    method="post">
                                    <input
                                        type="hidden"
                                        name="lectureId"
                                        th:value="${lectureEntity.id}">
                                    <button class="btn lectureEntity-btn lectureEntity-btn-cancel w-100">
                                        신청 취소
                                    </button>
                                </form>
                            </div>

                            <div
                                class="mt-4 lectureEntity-action-area"
                                th:unless="${selectedMorningLectureId != null and selectedMorningLectureId == lectureEntity.id}">
                                <form
                                    th:action="@{/lectures/apply}"
                                    method="post">
                                    <input
                                        type="hidden"
                                        name="lectureId"
                                        th:value="${lectureEntity.id}">
                                    <button
                                        class="btn lectureEntity-btn lectureEntity-btn-apply w-100"
                                        th:classappend="${selectedMorningLectureId != null or !lectureEntity.open ? ' lectureEntity-btn-muted' : ''}"
                                        th:disabled="${!lectureEntity.open or lectureEntity.full or selectedMorningLectureId != null}"
                                        th:text="${selectedMorningLectureId != null and selectedMorningLectureId == lectureEntity.id
                                            ? '선택한 특강'
                                            : (!lectureEntity.open ? '준비중' : (selectedMorningLectureId != null ? '이미 선택한 시간대입니다' : (lectureEntity.full ? '마감' : '신청하기')))}">
                                        신청하기
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div
            class="section-header"
            th:if="${canSelectAfternoonLecture == true}">
            <div class="section-icon">
                🌙
            </div>
            <div>
                <div class="section-title">
                    오후 특강
                </div>
            </div>
        </div>

        <div
            class="row g-3"
            th:if="${canSelectAfternoonLecture == true}">
            <div
                class="col-12"

                th:each="lectureEntity : ${afternoonLectures}">
                <div
                    class="card lectureEntity-card h-100"
                    th:classappend="${(selectedAfternoonLectureId != null and selectedAfternoonLectureId == lectureEntity.id ? ' lectureEntity-card-selected' : '') + (!lectureEntity.open ? ' lectureEntity-card-pending' : '')}"
                    th:attr="data-lecture-id=${lectureEntity.id},data-lecture-type='PM',data-remaining-capacity=${lectureEntity.remainingCapacity},data-full=${lectureEntity.full},data-open=${lectureEntity.open}">
                    <div class="card-body">
                        <div
                            class="selected-lectureEntity-badge mb-3"
                            th:classappend="${selectedAfternoonLectureId != null and selectedAfternoonLectureId == lectureEntity.id ? '' : ' d-none'}">
                            선택한 특강
                        </div>
                        <div
                            class="pending-lectureEntity-badge mb-3"
                            th:classappend="${lectureEntity.open ? ' d-none' : ''}">
                            준비중
                        </div>

                        <div class="lecture-speaker-line">
                            <h5
                                class="card-title"
                                th:text="${lectureEntity.speakerName + ' 강사'}">
                            </h5>
                            <span
                                class="lecture-job-badge"
                                th:text="${lectureEntity.speakerJob}">
                                직업
                            </span>
                        </div>
                        <p
                            class="card-text"

                            th:text="${lectureEntity.description}">
                        </p>
                        <span
                            class="badge bg-secondary"

                            th:text="${'남은 자리 ' + (lectureEntity.open ? lectureEntity.remainingCapacity : 0) + '명'}">
                        </span>

                        <div
                            class="mt-4 lectureEntity-action-area"
                            th:if="${selectedAfternoonLectureId != null and selectedAfternoonLectureId == lectureEntity.id}">
                            <form
                                th:action="@{/lectures/cancel}"
                                method="post">
                                <input
                                    type="hidden"
                                    name="lectureId"
                                    th:value="${lectureEntity.id}">
                                <button class="btn lectureEntity-btn lectureEntity-btn-cancel w-100">
                                    신청 취소
                                </button>
                            </form>
                        </div>

                        <div
                            class="mt-4 lectureEntity-action-area"
                            th:unless="${selectedAfternoonLectureId != null and selectedAfternoonLectureId == lectureEntity.id}">
                            <form
                                th:action="@{/lectures/apply}"
                                method="post">
                                <input
                                    type="hidden"
                                    name="lectureId"
                                    th:value="${lectureEntity.id}">
                                <button
                                    class="btn lectureEntity-btn lectureEntity-btn-apply w-100"
                                    th:classappend="${selectedAfternoonLectureId != null or !lectureEntity.open ? ' lectureEntity-btn-muted' : ''}"
                                    th:disabled="${!lectureEntity.open or lectureEntity.full or selectedAfternoonLectureId != null}"
                                    th:text="${selectedAfternoonLectureId != null and selectedAfternoonLectureId == lectureEntity.id
                                        ? '선택한 특강'
                                        : (!lectureEntity.open ? '준비중' : (selectedAfternoonLectureId != null ? '이미 선택한 시간대입니다' : (lectureEntity.full ? '마감' : '신청하기')))}">
                                    신청하기
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a
                th:if="${editLectureMode != true}"
                href="/home"
                class="btn home-link-button w-100">
                홈으로 가기
            </a>
            <a
                th:if="${editLectureMode == true}"
                th:href="${adminReturnUrl != null ? adminReturnUrl : '/lookup'}"
                class="btn home-link-button w-100"
                role="button">
                뒤로가기
            </a>
        </div>
    </div>

</div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>
<script>
    document.addEventListener('submit', async function (event) {
        const form = event.target;

        if (!form.matches('form[action$="/lectures/apply"], form[action$="/lectures/cancel"]')) {
            return;
        }

        event.preventDefault();

        const card = form.closest('.lectureEntity-card');
        const isCancelForm = form.getAttribute('action')?.endsWith('/lectures/cancel');
        const isPendingLecture = card?.dataset.open === 'false';

        if (isCancelForm && isPendingLecture) {
            const confirmed = window.confirm(
                '현재 신청이 불가능한 상태의 특강입니다.\n취소 후에는 다시 신청할 수 없을 수 있습니다.\n그래도 신청을 취소하시겠습니까?'
            );

            if (!confirmed) {
                return;
            }
        }

        const button = form.querySelector('button');
        if (button) {
            button.disabled = true;
        }

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams(new FormData(form))
            });
            const result = await response.json();

            if (!response.ok || !result.success) {
                showFlashToast(result.message || '처리 중 오류가 발생했습니다.', false);
                return;
            }

            updateLectureCards(result);
            showFlashToast(result.message, true);
        } catch (error) {
            showFlashToast('처리 중 오류가 발생했습니다.', false);
        } finally {
            if (button) {
                button.disabled = false;
            }
        }
    });

    function updateLectureCards(result) {
        const cards = document.querySelectorAll(
            `.lectureEntity-card[data-lecture-type="${result.lectureType}"]`
        );

        cards.forEach(function (card) {
            const lectureId = Number(card.dataset.lectureId);
            const isTarget = lectureId === Number(result.lectureId);
            const isSelected = result.selected && isTarget;
            const badge = card.querySelector('.selected-lectureEntity-badge');
            const remainingBadge = card.querySelector('.badge.bg-secondary');
            const actionArea = card.querySelector('.lectureEntity-action-area');

            card.classList.toggle('lectureEntity-card-selected', isSelected);

            if (badge) {
                badge.classList.toggle('d-none', !isSelected);
            }

            if (isTarget) {
                card.dataset.remainingCapacity = String(result.remainingCapacity);
                card.dataset.full = String(result.remainingCapacity <= 0);
                const displayedRemainingCapacity = card.dataset.open === 'false' ? 0 : result.remainingCapacity;
                remainingBadge.textContent = `남은 자리 ${displayedRemainingCapacity}명`;
            }

            actionArea.innerHTML = getActionHtml(card, result.selected);
        });
    }

    function getActionHtml(card, hasSelectedLecture) {
        const lectureId = card.dataset.lectureId;
        const isSelectedCard = card.classList.contains('lectureEntity-card-selected');
        const isFull = card.dataset.full === 'true';
        const isOpen = card.dataset.open === 'true';

        if (isSelectedCard) {
            return `
                <form action="/lectures/cancel" method="post">
                    <input type="hidden" name="lectureId" value="${lectureId}">
                    <button class="btn lectureEntity-btn lectureEntity-btn-cancel w-100">신청 취소</button>
                </form>
            `;
        }

        const disabled = !isOpen || hasSelectedLecture || isFull;
        const text = !isOpen ? '준비중' : (hasSelectedLecture ? '이미 선택한 시간대입니다' : (isFull ? '마감' : '신청하기'));

        return `
            <form action="/lectures/apply" method="post">
                <input type="hidden" name="lectureId" value="${lectureId}">
                <button class="btn lectureEntity-btn lectureEntity-btn-apply w-100${disabled ? ' lectureEntity-btn-muted' : ''}" ${disabled ? 'disabled' : ''}>
                    ${text}
                </button>
            </form>
        `;
    }

    function showFlashToast(message, success) {
        document.querySelectorAll('.flash-toast').forEach(function (toast) {
            toast.remove();
        });

        const toast = document.createElement('div');
        toast.className = `flash-toast ${success ? 'flash-toast-success' : 'flash-toast-error'}`;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(function () {
            toast.remove();
        }, 3300);
    }

</script>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>
</body>
</html>
