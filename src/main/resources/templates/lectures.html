<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1">

    <title>전체 강좌 보기</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            th:href="@{/css/register.css}">
    <link
            rel="stylesheet"
            th:href="@{/css/footer.css}">
</head>

<body>

<div class="registration-container">
    <div class="registration-card">
        <div class="text-center mb-4">
            <img
                    src="/images/wemission.png"
                    class="logo img-fluid mb-3">

            <div class="badge bg-primary fs-6 mb-3">
                2026 WEMISSION CAREER CAMP
            </div>

            <h2
                    class="camp-title"
                    th:text="${recruitmentEntity.name}">
                2026 위미션 진로캠프
            </h2>

            <h4 class="page-title">
                전체 강좌
            </h4>
        </div>

        <div class="section-header">
            <div class="section-icon">
                🌞
            </div>
            <div>
                <div class="section-title">
                    오전 특강
                </div>
            </div>
        </div>

        <div
                th:if="${#lists.isEmpty(morningLectures)}"
                class="alert alert-light border">
            등록된 오전 특강이 없습니다.
        </div>

        <div class="row g-3 mb-5">
            <div
                    class="col-12"
                    th:each="lectureEntity : ${morningLectures}">
                <div
                        class="card lectureEntity-card h-100"
                        th:classappend="${!lectureEntity.open ? ' lectureEntity-card-pending' : ''}">
                    <div class="card-body">
                        <div
                                class="pending-lectureEntity-badge mb-3"
                                th:classappend="${lectureEntity.open ? ' d-none' : ''}">
                            준비중
                        </div>
                        <div class="lecture-speaker-line">
                            <h5
                                    class="card-title"
                                    th:text="${lectureEntity.speakerName + ' 강사'}">
                                강사명
                            </h5>
                            <span
                                    class="lecture-job-badge"
                                    th:text="${lectureEntity.speakerJob}">
                                직업
                            </span>
                        </div>
                        <p
                                class="card-text"
                                th:text="${lectureEntity.description}">
                            강좌 설명
                        </p>
                        <span
                                class="badge bg-secondary"
                                th:text="${'남은 자리 ' + (lectureEntity.open ? lectureEntity.remainingCapacity : 0) + '명'}">
                            남은 자리
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-header">
            <div class="section-icon">
                🌙
            </div>
            <div>
                <div class="section-title">
                    오후 특강
                </div>
            </div>
        </div>

        <div
                th:if="${#lists.isEmpty(afternoonLectures)}"
                class="alert alert-light border">
            등록된 오후 특강이 없습니다.
        </div>

        <div class="row g-3">
            <div
                    class="col-12"
                    th:each="lectureEntity : ${afternoonLectures}">
                <div
                        class="card lectureEntity-card h-100"
                        th:classappend="${!lectureEntity.open ? ' lectureEntity-card-pending' : ''}">
                    <div class="card-body">
                        <div
                                class="pending-lectureEntity-badge mb-3"
                                th:classappend="${lectureEntity.open ? ' d-none' : ''}">
                            준비중
                        </div>
                        <div class="lecture-speaker-line">
                            <h5
                                    class="card-title"
                                    th:text="${lectureEntity.speakerName + ' 강사'}">
                                강사명
                            </h5>
                            <span
                                    class="lecture-job-badge"
                                    th:text="${lectureEntity.speakerJob}">
                                직업
                            </span>
                        </div>
                        <p
                                class="card-text"
                                th:text="${lectureEntity.description}">
                            강좌 설명
                        </p>
                        <span
                                class="badge bg-secondary"
                                th:text="${'남은 자리 ' + (lectureEntity.open ? lectureEntity.remainingCapacity : 0) + '명'}">
                            남은 자리
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a
                    href="/home"
                    class="btn home-link-button w-100">
                홈으로 가기
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>

</body>
</html>
