<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>신청 조회</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          th:href="@{/css/footer.css}">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .lookup-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 24px;
        }

        .lookup-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .lookup-title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .btn-lookup {
            height: 50px;
            font-size: 1rem;
            font-weight: 600;
        }

        .home-link-button {
            min-height: 50px;
            border: 1px solid #d7dee8;
            border-radius: 10px;
            background: #f8f9fb;
            color: #495057;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .home-link-button:hover {
            border-color: #c8d0dc;
            background: #eef1f5;
            color: #212529;
        }

        .form-control{
            height: 56px;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-control::placeholder {
            color: #adb5bd;
            opacity: 1;
        }

        .password-field {
            position: relative;
        }

        .password-field .form-control {
            padding-right: 58px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            width: 38px;
            height: 38px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: #212529;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-50%);
        }

        .password-toggle:hover {
            background: transparent;
            color: #000000;
        }

        .password-toggle:focus-visible {
            outline: 2px solid #adb5bd;
            outline-offset: 2px;
        }

        .password-toggle-icon-hide {
            display: none;
        }

        .password-toggle.is-visible .password-toggle-icon-show {
            display: none;
        }

        .password-toggle.is-visible .password-toggle-icon-hide {
            display: block;
        }

        .result-list {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }

        .result-card {
            border: 1px solid #dbe2ea;
            border-radius: 14px;
            padding: 16px;
            background: #fbfcfe;
            text-align: left;
            transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
        }

        .result-card:hover {
            border-color: #0d6efd;
            box-shadow: 0 6px 18px rgba(13, 110, 253, .12);
            transform: translateY(-1px);
        }

        .result-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .closed-recruitment-notice {
            margin-top: 16px;
            padding: 12px 14px;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            background: #f8f9fa;
            color: #6c757d;
            font-size: .92rem;
            font-weight: 600;
            text-align: center;
        }

        .lookup-action-button {
            min-height: 46px;
            border-radius: 10px;
            font-weight: 700;
        }

        .lookup-action-button-secondary {
            border: 1px solid #d7dee8;
            background: #f8f9fb;
            color: #495057;
        }

        .lookup-action-button-secondary:hover {
            border-color: #c8d0dc;
            background: #eef1f5;
            color: #212529;
        }

        .lookup-action-button-primary {
            border: 1px solid #0d6efd;
            background: #0d6efd;
            color: #ffffff;
        }

        .lookup-action-button-primary:hover {
            border-color: #0b5ed7;
            background: #0b5ed7;
            color: #ffffff;
        }

        .participant-name {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .lectureEntity-row {
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 10px;
            margin-top: 10px;
            color: #495057;
        }

        .lectureEntity-label {
            font-weight: 700;
            color: #0d6efd;
        }

        @media (max-width: 576px) {
            .lookup-container {
                padding: 10px;
            }

            .lookup-card {
                border-radius: 16px;
                padding: 18px;
            }

            .lookup-title {
                font-size: 1.4rem;
            }

            .result-actions {
                grid-template-columns: 1fr;
            }

            .form-control {
                height: 52px;
                font-size: .98rem;
            }

            .lectureEntity-row {
                grid-template-columns: 56px 1fr;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="lookup-container">
    <div class="lookup-card">
        <h2 class="lookup-title">신청 내역 조회</h2>

        <form
                method="post"
                action="/lookup">

            <div class="mb-3">
                <label class="form-label">전화번호</label>
                <input
                        type="text"
                        name="phoneNumber"
                        class="form-control form-control-lg"
                        inputmode="numeric"
                        pattern="[0-9]{10,11}"
                        minlength="10"
                        maxlength="11"
                        th:value="${phoneNumber}"
                        placeholder="10~11자리 숫자"
                        required>
            </div>

            <div class="mb-4">
                <label class="form-label">조회용 PIN</label>
                <div class="password-field">
                    <input
                            id="lookupPassword"
                            type="password"
                            name="password"
                            class="form-control form-control-lg"
                            inputmode="numeric"
                            pattern="[0-9]{6}"
                            minlength="6"
                            maxlength="6"
                            th:value="${password}"
                            placeholder="숫자 6자리"
                            required>
                    <button
                            id="lookupPasswordToggleButton"
                            type="button"
                            class="password-toggle"
                            aria-label="PIN 보기"
                            aria-pressed="false">
                        <svg
                                class="password-toggle-icon password-toggle-icon-show"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                aria-hidden="true">
                            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg
                                class="password-toggle-icon password-toggle-icon-hide"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                aria-hidden="true">
                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                            <path d="M6.61 6.61C3.64 8.61 2 12 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                            <line x1="2" x2="22" y1="2" y2="22"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button
                    type="submit"
                    class="btn btn-primary w-100 btn-lookup">
                조회하기
            </button>

        </form>

        <div
                th:if="${lookupErrorMessage}"
                class="alert alert-danger mt-4"
                th:text="${lookupErrorMessage}">
        </div>

        <div
                th:if="${searched == true and lookupErrorMessage == null and #lists.isEmpty(results)}"
                class="alert alert-warning mt-4">
            입력한 정보와 일치하는 신청 내역이 없습니다.
        </div>

        <div
                th:if="${results != null and !#lists.isEmpty(results)}"
                class="result-list">
            <div
                    class="result-card"
                    th:each="result : ${results}">
                <div
                        class="participant-name"
                        th:text="${result.participantName}">
                    참가자명
                </div>

                <div class="text-muted small">
                    <span th:text="${result.participantType.name() == 'STUDENT' ? '학생' : '교사'}">
                        학생
                    </span>
                    ·
                    <span th:text="${result.churchName}">
                        교회명
                    </span>
                </div>

                <div class="lectureEntity-row">
                    <div class="lectureEntity-label">오전</div>
                    <div th:text="${result.morningLectureName}">미신청</div>
                </div>

                <div class="lectureEntity-row">
                    <div class="lectureEntity-label">오후</div>
                    <div th:text="${result.afternoonLectureName}">미신청</div>
                </div>

                <div
                        class="result-actions"
                        th:if="${result.recruitmentOpen}">
                    <form
                            method="post"
                            action="/lookup/edit-participant">
                        <input
                                type="hidden"
                                name="participantLectureId"
                                th:value="${result.participantLectureId}">
                        <button
                                type="submit"
                                class="btn lookup-action-button lookup-action-button-secondary w-100">
                            인적사항 수정
                        </button>
                    </form>

                    <form
                            method="post"
                            action="/lookup/edit-lecture">
                        <input
                                type="hidden"
                                name="participantLectureId"
                                th:value="${result.participantLectureId}">
                        <button
                                type="submit"
                                class="btn lookup-action-button lookup-action-button-primary w-100">
                            수강신청 수정
                        </button>
                    </form>
                </div>

                <div
                        class="closed-recruitment-notice"
                        th:if="${!result.recruitmentOpen}">
                    모집이 종료되어 신청 정보를 수정할 수 없습니다.
                </div>
            </div>
        </div>

        <a
                href="/home"
                class="btn home-link-button w-100 mt-4"
                role="button">
            홈으로 가기
        </a>

    </div>

</div>

<div th:replace="~{fragments/footer :: siteFooter}"></div>
<div th:replace="~{fragments/footer :: adminLoginModal}"></div>

<script>
    const lookupPassword = document.getElementById('lookupPassword');
    const lookupPasswordToggleButton = document.getElementById('lookupPasswordToggleButton');

    if (lookupPassword) {
        lookupPassword.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
        });
    }

    if (lookupPasswordToggleButton && lookupPassword) {
        lookupPasswordToggleButton.addEventListener('click', function () {
            const shouldShow = lookupPassword.type === 'password';

            lookupPassword.type = shouldShow ? 'text' : 'password';
            this.classList.toggle('is-visible', shouldShow);
            this.setAttribute('aria-label', shouldShow ? 'PIN 숨기기' : 'PIN 보기');
            this.setAttribute('aria-pressed', String(shouldShow));
        });
    }
</script>
<script th:replace="~{fragments/footer :: siteFooterScript}"></script>
</body>
</html>
