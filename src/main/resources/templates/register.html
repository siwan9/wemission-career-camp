<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>2026 위미션 진로캠프 - 진로특강 신청</title>

    <link th:href="@{/vendor/bootstrap/bootstrap.min.css}"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/register.css}">
    <link rel="stylesheet"
          th:href="@{/css/footer.css}">
</head>
<body>

    <div class="registration-container">
        <div class="registration-card">
            <!-- 로고 및 안내 -->
            <div class="text-center mb-4">

                <!-- 로고 이미지 -->
                <img th:src="@{/images/wemission.png}"
                     alt="위미션 로고"
                     class="logo img-fluid mb-3">

                <div class="badge bg-primary fs-6 mb-3">
                    2026 WEMISSION CAREER CAMP
                </div>

                <h2 class="camp-title">
                    2026 위미션 진로캠프
                </h2>

                <h4 class="page-title mb-3">
                    진로특강 신청
                </h4>

                <p class="text-muted">
                    참가자 정보를 입력한 후<br>
                    다음 단계에서 신청할 특강을 선택해주세요.
                </p>

            </div>

            <!-- 신청 안내 -->
            <div class="alert alert-info">
                <strong>신청 안내</strong><br>
                <ul
                        class="notice-content"
                        th:if="${recruitmentNoticeLines != null}">
                    <li
                            th:each="noticeLine : ${recruitmentNoticeLines}">
                        <span th:if="${#strings.isEmpty(#strings.trim(noticeLine))}">&nbsp;</span>
                        <span
                                class="notice-line-text"
                                th:unless="${#strings.isEmpty(#strings.trim(noticeLine))}"
                                th:text="${noticeLine}">
                            신청 안내가 표시됩니다.
                        </span>
                    </li>
                </ul>
            </div>

            <form id="registrationForm"
                  th:action="${editMode == true} ? @{/register/edit} : @{/lecture}"
                  method="post"
                  th:object="${request}"
                  th:attr="data-edit-mode=${editMode == true}">
                <div
                        th:if="${canSubmitRegistration != true}"
                        class="alert alert-warning">
                    현재 신청에 필요한 신분 또는 교회 목록이 설정되지 않았습니다.
                </div>

                <div class="section-header">

                    <div class="section-icon">
                        👤
                    </div>

                    <div>

                        <div class="section-title">
                            참가자 정보
                        </div>

                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">이름</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{name}"
                           placeholder="이름을 입력해주세요" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        신분
                    </label>

                    <select
                            id="participantTypeId"
                            class="form-select"
                            name="participantTypeId"
                            th:disabled="${canSubmitRegistration != true}"
                            required>
                        <option
                                value=""
                                disabled
                                th:selected="${request.participantTypeId == null}">
                            신분을 선택해주세요
                        </option>
                        <option
                                th:each="participantTypeEntity : ${participantTypes}"
                                th:value="${participantTypeEntity.id}"
                                th:selected="${request.participantTypeId != null and request.participantTypeId == participantTypeEntity.id}"
                                th:text="${participantTypeEntity.type.name() == 'STUDENT' ? '학생' : '교사'}">
                            학생
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">교회명</label>
                    <div class="church-combobox" data-church-combobox>
                        <input
                                id="churchSearchInput"
                                type="text"
                                class="form-control"
                                placeholder="교회명을 검색해주세요"
                                th:disabled="${canSubmitRegistration != true}"
                                autocomplete="off"
                                role="combobox"
                                aria-expanded="false"
                                aria-controls="churchOptions"
                                required>
                        <input
                                type="hidden"
                                th:field="*{churchId}"
                                id="churchId">
                        <div
                                id="churchOptions"
                                class="church-options"
                                role="listbox"
                                hidden>
                            <button
                                    type="button"
                                    class="church-option"
                                    role="option"
                                    th:each="church : ${churches}"
                                    th:attr="data-church-id=${church.id},data-church-name=${church.name}"
                                    th:text="${church.name}">
                                교회명
                            </button>
                            <div class="church-empty" hidden>
                                일치하는 교회가 없습니다.
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">전화번호</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{phoneNumber}"
                           inputmode="numeric"
                           pattern="[0-9]{10,11}"
                           minlength="10"
                           maxlength="11"
                           placeholder="10~11자리 숫자" required>
                </div>

                <button
                        id="submitButton"
                        type="submit"
                        class="btn btn-primary w-100 submit-btn mt-4"
                        th:disabled="${canSubmitRegistration != true}">
                    <span th:text="${editMode == true ? '저장하기' : '다음'}">
                        다음
                    </span>
                </button>

            </form>

            <div class="mt-3">
                <form
                        th:if="${editMode != true}"
                        method="post"
                        th:action="@{/registration/cancel}">
                    <button
                            type="submit"
                            class="btn home-link-button w-100"
                            th:text="${adminReturnUrl != null ? '뒤로가기' : '홈으로 가기'}">
                        홈으로 가기
                    </button>
                </form>
                <a
                        th:if="${editMode == true}"
                        th:href="${adminReturnUrl != null ? adminReturnUrl : '/lookup'}"
                        class="btn home-link-button w-100"
                        role="button">
                    뒤로가기
                </a>
            </div>

        </div>
    </div>
    <div th:replace="~{fragments/footer :: siteFooter}"></div>
    <div th:replace="~{fragments/footer :: adminLoginModal}"></div>
    <script th:src="@{/vendor/bootstrap/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/register.js}"></script>
    <script th:replace="~{fragments/footer :: siteFooterScript}"></script>

</body>
</html>
